<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Degree Theorem — Interactive Proof Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f8f9fa;color:#333}

/* Header */
header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600}
header h1 sub{font-size:12px}
.lang-sw{margin-left:auto;display:flex;gap:2px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.lang-sw button{padding:4px 12px;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer}
.lang-sw button.active{background:rgba(255,255,255,.15);color:#ffd700}

/* Progress */
.progress-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;padding:0 16px;overflow-x:auto}
.step-dot{padding:10px 14px;font-size:12px;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
.step-dot:hover{color:#666}
.step-dot.active{color:#1a1a2e;border-bottom-color:#ffd700;font-weight:600}

/* Layout */
.main{display:flex;height:calc(100vh - 95px);min-height:500px}
.sidebar{width:300px;min-width:300px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;padding:16px;overflow-y:auto}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.viz-area{flex:1;position:relative;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}

/* Sidebar */
.sidebar h3{font-size:12px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
#sideCanvas{width:268px;height:268px;border:1px solid #eee;border-radius:10px;background:#fafafa;align-self:center}
.side-info{margin-top:12px;font-size:13px;line-height:1.8}
.side-info b{color:#e74c3c}

/* Cards */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:20px;max-width:800px;width:100%}
.card h2{font-size:18px;margin-bottom:12px;color:#1a1a2e}
.card p{font-size:14px;line-height:1.8;color:#555;margin-bottom:10px}
.card .highlight{background:#fff8e1;border-left:4px solid #ffd700;padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:14px}
.card .formula{display:inline-block;background:#f0f4ff;padding:4px 10px;border-radius:6px;font-family:'Courier New',monospace;color:#2c3e50;font-size:14px;margin:4px 0}
.card .try-it{background:#e8f5e9;border:1px solid #c8e6c9;border-radius:8px;padding:12px;margin:12px 0;font-size:13px}
.card .try-it b{color:#2e7d32}

/* Controls */
.ctrl{display:flex;gap:8px;align-items:center;margin:10px 0;flex-wrap:wrap}
.ctrl label{font-size:13px;color:#666}
.ctrl select,.ctrl button{padding:6px 14px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;cursor:pointer}
.ctrl button{background:#1a1a2e;color:#fff;border:none}
.ctrl button:hover{background:#2a2a4e}
.n-btns{display:flex;gap:4px}
.n-btn{width:34px;height:34px;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;color:#666}
.n-btn:hover{border-color:#1a1a2e;color:#1a1a2e}
.n-btn.active{border-color:#ffd700;background:#fff8e1;color:#c79100}
.s-btn{width:28px;height:28px;border:2px solid #ddd;border-radius:6px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;color:#666}
.s-btn:hover{border-color:#1a1a2e;color:#1a1a2e}
.s-btn.active{border-color:#ffd700;background:#fff8e1;color:#c79100}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.data-table th{background:#f5f5f5;padding:8px;text-align:center;font-weight:600;border-bottom:2px solid #eee}
.data-table td{padding:6px 8px;text-align:center;border-bottom:1px solid #f0f0f0}
.data-table tr.min-row{background:#e8f5e9;font-weight:600}
.data-table tr:hover{background:#f8f8f8}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px}
.bar-label{width:160px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;font-size:11px}
.bar-track{flex:1;height:22px;background:#f0f0f0;border-radius:4px;position:relative;overflow:hidden}
.bar-fill-split{height:100%;background:#3498db;position:absolute;left:0;top:0;border-radius:4px 0 0 4px}
.bar-fill-merge{height:100%;background:#e74c3c;position:absolute;top:0;border-radius:0 4px 4px 0}
.bar-val{width:30px;font-weight:700;color:#333}
.bar-min{background:#fff8e1 !important}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

/* Responsive */
@media(max-width:800px){
  .sidebar{display:none}
  .main{height:auto;flex-direction:column}
  .card{padding:16px}
  .card h2{font-size:16px}
  header{padding:10px 16px}
  header h1{font-size:14px}
  .bar-label{width:100px;font-size:10px}
  .n-btn{width:30px;height:30px;font-size:13px}
  .data-table{font-size:11px}
  .data-table th,.data-table td{padding:4px 6px}
  .progress-bar{padding:0 8px}
  .step-dot{padding:8px 10px;font-size:11px}
  .ctrl{gap:6px}
  .ctrl select,.ctrl button{padding:5px 10px;font-size:12px}
}
</style>
</head>
<body>

function T(k) { return L[lang][k] || L['zh'][k] || k; }

// ========== Math Core ==========
function isNoncrossing(blocks) {
  for (let i = 0; i < blocks.length; i++)
    for (let j = i + 1; j < blocks.length; j++) {
      const A = blocks[i], B = blocks[j];
      for (const a of A) for (const c of A) if (c > a)
        for (const b of B) for (const d of B) if (d > b)
          if ((a < b && b < c && c < d) || (b < a && a < d && d < c)) return false;
    }
  return true;
}

function generateNC(n) {
  const results = [];
  function bt(pos, blocks) {
    if (pos > n) { results.push(blocks.map(b => [...b])); return; }
    for (let i = 0; i < blocks.length; i++) {
      blocks[i].push(pos);
      if (isNoncrossing(blocks)) bt(pos + 1, blocks);
      blocks[i].pop();
    }
    blocks.push([pos]); bt(pos + 1, blocks); blocks.pop();
  }
  bt(1, []);
  return results.map(p => p.map(b => b.sort((x,y)=>x-y)).sort((x,y)=>x[0]-y[0]));
}

const ncCache = {};
function getNC(n) { return ncCache[n] || (ncCache[n] = generateNC(n)); }

function pStr(p) { return p.map(b => '{' + b.join(',') + '}').join(' '); }

function canMergeBlocks(blocks, i, j) {
  const merged = [...blocks[i], ...blocks[j]].sort((x,y)=>x-y);
  const rest = blocks.filter((_,idx) => idx!==i && idx!==j);
  return isNoncrossing([merged, ...rest]);
}

function getSplits(partition) {
  const results = [];
  for (let bi = 0; bi < partition.length; bi++) {
    const block = partition[bi];
    if (block.length < 2) continue;
    const s = block.length;
    for (let mask = 1; mask < (1 << s) - 1; mask++) {
      const a = [], b = [];
      for (let i = 0; i < s; i++) { if (mask & (1<<i)) a.push(block[i]); else b.push(block[i]); }
      if (a.length === 0 || b.length === 0) continue;
      const newPart = [...partition.slice(0, bi), a, b, ...partition.slice(bi+1)];
      if (isNoncrossing(newPart)) {
        const key = pStr(newPart.map(x=>[...x].sort((u,v)=>u-v)).sort((u,v)=>u[0]-v[0]));
        if (!results.find(r => r.key === key)) {
          results.push({ key, from: bi, partA: a, partB: b,
            result: newPart.map(x=>[...x].sort((u,v)=>u-v)).sort((u,v)=>u[0]-v[0]) });
        }
      }
    }
  }
  return results;
}

function getMerges(partition) {
  const results = [];
  for (let i = 0; i < partition.length; i++)
    for (let j = i+1; j < partition.length; j++)
      if (canMergeBlocks(partition, i, j))
        results.push({ i, j, blockA: partition[i], blockB: partition[j] });
  return results;
}

function twoChain(n, s) {
  function chain(a, b) {
    const blocks = [];
    let lo = a, hi = b;
    while (lo < hi) { blocks.push([lo, hi]); lo++; hi--; }
    if (lo === hi) blocks.push([lo]);
    return blocks;
  }
  const blocks = [];
  if (s > 0) blocks.push(...chain(1, s));
  if (s < n) blocks.push(...chain(s+1, n));
  return blocks.sort((x,y) => x[0] - y[0]);
}

function isTwoChain(partition, n) {
  for (let s = 0; s < n; s++) {
    if (pStr(twoChain(n, s)) === pStr(partition)) return s;
  }
  return -1;
}

// ========== Degree cache ==========
const degCache = {};
function getDegreeData(n) {
  if (degCache[n]) return degCache[n];
  const parts = getNC(n);
  const data = parts.map(p => {
    const s = getSplits(p).length, m = getMerges(p).length;
    return { p, splits: s, merges: m, deg: s + m };
  });
  degCache[n] = data;
  return data;
}

// ========== Drawing ==========
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#e84393','#00cec9'];

function drawPartition(canvas, partition, n, opts = {}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = Math.min(W,H) * 0.36;
  ctx.clearRect(0, 0, W, H);

  const pts = [];
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI/2 + 2*Math.PI*i/n;
    pts.push({ x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle) });
  }

  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.stroke();

  partition.forEach((block, bi) => {
    const col = COLORS[bi % COLORS.length];
    ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.45;
    if (block.length >= 2) {
      for (let i = 0; i < block.length; i++)
        for (let j = i+1; j < block.length; j++) {
          const a = pts[block[i]-1], b = pts[block[j]-1];
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
    }
    if (block.length >= 3) {
      ctx.fillStyle = col; ctx.globalAlpha = 0.08;
      ctx.beginPath(); ctx.moveTo(pts[block[0]-1].x, pts[block[0]-1].y);
      for (let i = 1; i < block.length; i++) ctx.lineTo(pts[block[i]-1].x, pts[block[i]-1].y);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  partition.forEach((block, bi) => {
    const col = COLORS[bi % COLORS.length];
    block.forEach(elem => {
      const p = pts[elem-1];
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, 2*Math.PI); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(elem, p.x, p.y);
    });
  });

  if (opts.label) {
    ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(opts.label, cx, H - 8);
  }
}

function showSidePartition(partition, n, info) {
  drawPartition(document.getElementById('sideCanvas'), partition, n, { label: pStr(partition) });
  if (info) document.getElementById('sideInfo').innerHTML = info;
}

function resetSideInfo() {
  document.getElementById('sideInfo').innerHTML = T('side_default');
}

// ========== Steps ==========
let currentStep = 0;
let currentN = 5;

function buildProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = T('steps').map((s, i) =>
    `<div class="step-dot${i===currentStep?' active':''}" data-step="${i}">${s}</div>`
  ).join('');
  bar.querySelectorAll('.step-dot').forEach(d =>
    d.addEventListener('click', () => goStep(+d.dataset.step))
  );
}

function goStep(i) {
  currentStep = i;
  buildProgress();
  resetSideInfo();
  const renders = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7, renderStep8];
  renders[i]();
}

function nSelector(selected, onChange) {
  let html = '<div class="n-btns">';
  for (const v of [3,4,5,6,7]) {
    html += `<button class="n-btn${v===selected?' active':''}" data-n="${v}">${v}</button>`;
  }
  html += '</div>';
  setTimeout(() => {
    document.querySelectorAll('.viz-area .n-btn[data-n]').forEach(b =>
      b.addEventListener('click', () => { onChange(+b.dataset.n); })
    );
  }, 0);
  return html;
}

function partSelect(n, selId, onChange) {
  const parts = getNC(n);
  let html = `<select id="${selId}" style="max-width:300px;padding:6px;border:1px solid #ddd;border-radius:6px;font-family:monospace;font-size:12px">`;
  parts.forEach((p, i) => { html += `<option value="${i}">${pStr(p)}</option>`; });
  html += '</select>';
  setTimeout(() => {
    const sel = document.getElementById(selId);
    if (sel) sel.addEventListener('change', () => onChange(+sel.value));
  }, 0);
  return html;
}

// ---- Step 0: What is NC ----
function renderStep0() {
  const parts = getNC(currentN);
  const viz = document.getElementById('vizArea');

  viz.innerHTML = `<div class="card fade-in">
    <h2>${T('s0_title')}</h2>
    <p>${T('s0_p1')}</p>
    <p>${T('s0_p2')}</p>
    <p>${T('s0_p3')}</p>
    <div class="ctrl"><label>n =</label>${nSelector(currentN, n => { currentN = n; renderStep0(); })}</div>
    <p>${T('s0_count')(currentN, parts.length)}</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px" id="partGrid"></div>
    <div class="try-it"><b>💡</b> ${T('s0_try')}</div>
  </div>`;

  const grid = document.getElementById('partGrid');
  parts.forEach((p, i) => {
    const c = document.createElement('canvas');
    c.width = 120; c.height = 120;
    c.style.cssText = 'border:1px solid #eee;border-radius:8px;cursor:pointer;background:#fafafa;transition:box-shadow .2s';
    c.addEventListener('mouseenter', () => c.style.boxShadow = '0 2px 8px rgba(0,0,0,.15)');
    c.addEventListener('mouseleave', () => c.style.boxShadow = 'none');
    c.addEventListener('click', () => {
      const splits = getSplits(p);
      const merges = getMerges(p);
      showSidePartition(p, currentN,
        `<div><b>${pStr(p)}</b></div>` +
        `<div>${p.length} ${T('lbl_groups')}, ${T('lbl_degree')} = ${splits.length + merges.length}</div>`
      );
    });
    grid.appendChild(c);
    drawPartition(c, p, currentN);
  });
}

// ---- Step 1: Split & Merge ----
function renderStep1() {
  const parts = getNC(currentN);
  const viz = document.getElementById('vizArea');

  viz.innerHTML = `<div class="card fade-in">
    <h2>${T('s1_title')}</h2>
    <p>${T('s1_p1')}</p>
    <p>${T('s1_p2')}</p>
    <div class="ctrl"><label>n =</label>${nSelector(currentN, n => { currentN = n; renderStep1(); })}
    <label style="margin-left:12px">${T('lbl_partition')}</label>${partSelect(currentN, 'selP1', showSplitMerge)}</div>
    <div id="splitMergeArea"></div>
    <div class="try-it"><b>💡</b> ${T('s1_try')}</div>
  </div>`;

  showSplitMerge(0);

  function showSplitMerge(idx) {
    const p = parts[idx];
    const splits = getSplits(p);
    const merges = getMerges(p);
    showSidePartition(p, currentN, `<b>${pStr(p)}</b><br>${p.length} ${T('lbl_groups')}`);

    let html = `<p style="margin:12px 0">${T('s1_result')(splits.length, merges.length)}</p>`;
    html += `<div style="display:flex;gap:20px;flex-wrap:wrap">`;
    html += `<div><b style="color:#3498db">↗ ${T('s1_split')} (${splits.length})</b><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">`;
    splits.forEach(s => {
      html += `<div style="background:#f0f4ff;padding:4px 8px;border-radius:6px;font-family:monospace;font-size:11px;cursor:pointer" class="sm-split" data-result="${encodeURIComponent(JSON.stringify(s.result))}">${s.key.replace(/\|/g,' ')}</div>`;
    });
    html += '</div></div>';
    html += `<div><b style="color:#e74c3c">↘ ${T('s1_merge')} (${merges.length})</b><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">`;
    merges.forEach(m => {
      const merged = [...m.blockA, ...m.blockB].sort((x,y)=>x-y);
      const newPart = [...p.filter((_,idx2) => idx2 !== m.i && idx2 !== m.j), merged].sort((x,y)=>x[0]-y[0]);
      html += `<div style="background:#fde8e8;padding:4px 8px;border-radius:6px;font-family:monospace;font-size:11px;cursor:pointer" class="sm-merge" data-result="${encodeURIComponent(JSON.stringify(newPart))}">{${m.blockA}}+{${m.blockB}}</div>`;
    });
    html += '</div></div></div>';
    document.getElementById('splitMergeArea').innerHTML = html;

    // Split click: show resulting partition
    document.querySelectorAll('.sm-split').forEach(el => {
      el.addEventListener('click', () => {
        try {
          const p2 = JSON.parse(decodeURIComponent(el.dataset.result));
          if (p2) showSidePartition(p2, currentN, `<b>${pStr(p2)}</b><br>${T('lbl_splits')}`);
        } catch(e) { console.warn('split click error', e); }
      });
    });
    // Merge click: show resulting partition
    document.querySelectorAll('.sm-merge').forEach(el => {
      el.addEventListener('click', () => {
        try {
          const p2 = JSON.parse(decodeURIComponent(el.dataset.result));
          if (p2) showSidePartition(p2, currentN, `<b>${pStr(p2)}</b><br>${T('lbl_merge_result')}`);
        } catch(e) { console.warn('merge click error', e); }
      });
    });
  }
}

// ---- Step 2: Degree ----

      <div class="bar-label">${pStr(d.p)}</div>
      <div class="bar-track">
        <div class="bar-fill-split" style="width:${sw}%"></div>
        <div class="bar-fill-merge" style="left:${sw}%;width:${mw}%"></div>

    </div>`;

  viz.innerHTML = `<div class="card fade-in" style="max-height:100%;overflow-y:auto">

// ---- Step 5: Counting merges (merge graph) ----
function renderStep5() {
  const parts = getNC(currentN);
  const viz = document.getElementById('vizArea');

  viz.innerHTML = `<div class="card fade-in" style="max-height:100%;overflow-y:auto">
    <h2>${T('s5_title')}</h2>
    <h3 style="color:#e74c3c;font-size:14px;margin:14px 0 6px">${T('s5_step1')}</h3>

    <p>${T('s5_step2_explain')}</p>
    <h3 style="color:#e74c3c;font-size:14px;margin:14px 0 6px">${T('s5_step3')}</h3>
    <p>${T('s5_step3_explain')}</p>
    <div class="ctrl"><label>n =</label>${nSelector(currentN, n => { currentN = n; renderStep5(); })}
    <label style="margin-left:12px">${T('lbl_partition')}</label>${partSelect(currentN, 'selP5', showMergeGraph)}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
      <canvas id="mergePartCanvas" width="280" height="280" style="border:1px solid #eee;border-radius:10px;background:#fafafa"></canvas>
      <canvas id="mergeGraphCanvas" width="320" height="280" style="border:1px solid #eee;border-radius:10px;background:#fafafa"></canvas>
    </div>
    <div id="mergeDetail" style="margin-top:8px"></div>
    <div class="try-it"><b>💡</b> ${T('s5_try')}</div>
  </div>`;

  showMergeGraph(0);

  function showMergeGraph(idx) {
    const p = parts[idx];
    showSidePartition(p, currentN, `<b>${pStr(p)}</b><br>${p.length} ${T('lbl_groups')}`);
    drawPartition(document.getElementById('mergePartCanvas'), p, currentN, { label: pStr(p) });

    const merges = getMerges(p);
    const k = p.length;

    // Nesting forest
    const spans = p.map(b => [Math.min(...b), Math.max(...b)]);
    const parent = new Array(k).fill(-1);
    for (let i = 0; i < k; i++) {
      let best = -1, bestW = Infinity;
      for (let j = 0; j < k; j++) {
        if (i === j) continue;
        const w = spans[j][1] - spans[j][0];
        if (spans[j][0] <= spans[i][0] && spans[i][1] <= spans[j][1] && w < bestW &&
            (spans[j][0] < spans[i][0] || spans[j][1] > spans[i][1])) {
          best = j; bestW = w;
        }
      }
      parent[i] = best;
    }
    const roots = [];
    for (let i = 0; i < k; i++) if (parent[i] === -1) roots.push(i);

    // Draw merge graph
    const ctx = document.getElementById('mergeGraphCanvas').getContext('2d');
    const W = 320, H = 280;
    ctx.clearRect(0, 0, W, H);
    const cx = W/2, cy = H/2 - 10, R = 90;
    const bpos = [];
    for (let i = 0; i < k; i++) {
      const angle = -Math.PI/2 + (k > 1 ? i*2*Math.PI/k : 0);
      bpos.push({ x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle) });
    }

    merges.forEach(m => {
      const isPC = parent[m.i] === m.j || parent[m.j] === m.i;
      const isRR = roots.includes(m.i) && roots.includes(m.j);
      ctx.strokeStyle = isPC ? '#3498db' : isRR ? '#2ecc71' : '#f39c12';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(bpos[m.i].x, bpos[m.i].y); ctx.lineTo(bpos[m.j].x, bpos[m.j].y); ctx.stroke();
    });

    for (let i = 0; i < k; i++) {
      const isRoot = roots.includes(i);
      ctx.fillStyle = isRoot ? '#2ecc71' : COLORS[i % COLORS.length];
      ctx.beginPath(); ctx.arc(bpos[i].x, bpos[i].y, 18, 0, 2*Math.PI); ctx.fill();
      ctx.strokeStyle = isRoot ? '#1a9e4a' : '#fff'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('{'+p[i].join(',')+'}', bpos[i].x, bpos[i].y);
    }

    ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#3498db'; ctx.fillText(T('s5_legend_pc'), cx-70, H-12);
    ctx.fillStyle = '#2ecc71'; ctx.fillText(T('s5_legend_rr'), cx+70, H-12);

    document.getElementById('mergeDetail').innerHTML =
      `<p>${k} ${T('s5_nodes')}, ${merges.length} ${T('s5_edges')} ≥ k−1 = ${k-1}
      <span style="color:#27ae60;font-weight:600"> ← ${T('s5_connected')}</span></p>`;
  }
}

// ---- Crossing diagram helper ----
// bgArcs: [[a,b], ...] light background arcs showing chain structure
// arcRed/arcBlue: witness pair from merged/victim block
// splitAt: optional element index — draw a dashed vertical line after this element
function drawCrossingDiagram(canvasId, n, bgArcs, arcRed, arcBlue, labelRed, labelBlue, splitAt) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const margin = 30, baseY = H - 26;
  const gap = (W - 2*margin) / (n - 1);
  const xOf = i => margin + (i-1) * gap;

  // baseline
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(margin-8, baseY); ctx.lineTo(W-margin+8, baseY); ctx.stroke();

  // split line (chain boundary)
  if (splitAt) {
    const sx = (xOf(splitAt) + xOf(splitAt+1)) / 2;
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(sx, 20); ctx.lineTo(sx, baseY + 10); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#aaa'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(lang==='zh'?'左链':'L', sx - 14, baseY + 16);
    ctx.fillText(lang==='zh'?'右链':'R', sx + 14, baseY + 16);
  }

  // background arcs (chain structure, light)
  const BG_COLS = ['#bbdefb','#c8e6c9','#ffe0b2','#e1bee7','#b2dfdb'];
  bgArcs.forEach((arc, i) => {
    if (arc.length < 2) return;
    const x1 = xOf(arc[0]), x2 = xOf(arc[1]);
    const rx = (x2-x1)/2, ry = Math.max(rx * 0.5, 12);
    ctx.strokeStyle = BG_COLS[i % BG_COLS.length]; ctx.lineWidth = 3; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.ellipse((x1+x2)/2, baseY, rx, ry, 0, Math.PI, 0); ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // witness arcs (bold, on top)
  function drawArc(endpoints, color, label, dashed) {
    const x1 = xOf(endpoints[0]), x2 = xOf(endpoints[1]);
    const cx = (x1+x2)/2, rx = (x2-x1)/2, ry = Math.max(rx * 0.6, 16);
    ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    ctx.setLineDash(dashed ? [6,3] : []);
    ctx.beginPath(); ctx.ellipse(cx, baseY, rx, ry, 0, Math.PI, 0); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = color; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(label, cx, baseY - ry - 6);
  }

  drawArc(arcRed, '#e74c3c', labelRed, true);
  drawArc(arcBlue, '#1565c0', labelBlue, false);

  // crossing X
  const allPts = [arcRed[0], arcRed[1], arcBlue[0], arcBlue[1]].sort((a,b)=>a-b);
  const xCross = (xOf(allPts[1]) + xOf(allPts[2])) / 2;
  ctx.fillStyle = '#c62828'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('✗', xCross, baseY - 30);

  // crossing pattern at top
  ctx.font = 'bold 11px sans-serif';
  ctx.fillText(allPts.join(' < ') + '  →  ' + (lang==='zh'?'交叉！':'crossing!'), W/2, 13);

  // elements
  const crossSet = [arcRed[0], arcRed[1], arcBlue[0], arcBlue[1]];
  for (let i = 1; i <= n; i++) {
    ctx.fillStyle = crossSet.includes(i) ? '#c62828' : '#666';
    ctx.beginPath(); ctx.arc(xOf(i), baseY, 9, 0, 2*Math.PI); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(i, xOf(i), baseY);
  }
}

  // Case 2: cross-chain (n=8, left {1,6}{2,5}{3,4} | right {7,8})
  // Try merge {2,5}+{7,8} across chains. Witness arcs [2,7] x [1,6].
  drawCrossingDiagram('crossCanvas2', 8,
    [[1,6],[2,5],[3,4],[7,8]],      // bg: left chain + right chain
    [2,7], [1,6],                    // witness arcs
    '{2,5,7,8}', '{1,6}',           // labels
    6);                              // split line after element 6
}

// ---- Step 8: Uniqueness ----
function renderStep8() {
  const parts = getNC(currentN);
  const minDeg = currentN - 1;
  const viz = document.getElementById('vizArea');

  const small = parts.filter(p => p.every(b => b.length <= 2));
  const data = small.map(p => {
    const s = getSplits(p).length, m = getMerges(p).length;
    const deg = s + m;
    const tc = isTwoChain(p, currentN);
    return { p, deg, isMin: deg === minDeg, isTwoChain: tc >= 0, tcIndex: tc };
  });

  let rows = '';
  data.forEach(d => {
    rows += `<tr class="${d.isMin?'min-row':''}" style="cursor:pointer" data-p="${encodeURIComponent(JSON.stringify(d.p))}">
      <td style="font-family:monospace;font-size:11px;text-align:left">${pStr(d.p)}</td>
      <td><b>${d.deg}</b></td>
      <td>${d.isMin?'<span style="color:#27ae60">✓</span>':''}</td>
      <td>${d.isTwoChain?`<span style="color:#27ae60">π_${d.tcIndex}</span>`:''}</td>
    </tr>`;
  });

  const minCount = data.filter(d => d.isMin).length;

  viz.innerHTML = `<div class="card fade-in" style="max-height:100%;overflow-y:auto">
    <h2>${T('s8_title')}</h2>
    <p>${T('s8_p1')}</p>
    <p>${T('s8_p2')}</p>
    <p>${T('s8_p3')}</p>
    <p>${T('s8_p4')}</p>
    <div class="ctrl"><label>n =</label>${nSelector(currentN, n => { currentN = n; renderStep8(); })}</div>
    <table class="data-table">
      <tr><th style="text-align:left">${T('s8_partition')}</th><th>${T('s8_degree')}</th><th>${T('s8_ismin')}</th><th>${T('s8_is_twochain')}</th></tr>
      ${rows}
    </table>
    <div class="highlight" style="font-size:14px">
      ${T('s8_conclusion')(currentN, minCount)}
    </div>
    <div class="try-it"><b>💡</b> ${T('s8_try')}</div>
  </div>`;

  document.querySelectorAll('.data-table tr[data-p]').forEach(row => {
    row.addEventListener('click', () => {
      try {
        const p = JSON.parse(decodeURIComponent(row.dataset.p));
        const tc = isTwoChain(p, currentN);
        showSidePartition(p, currentN,
          `<b>${pStr(p)}</b><br>${T('lbl_degree')} = ${getSplits(p).length + getMerges(p).length}<br>${tc>=0 ? `π_${tc}` : ''}`
        );
      } catch(e) { console.warn('row click error', e); }
    });
  });
}

// ========== Language toggle ==========
function applyLang() {
  document.getElementById('htmlRoot').lang = lang === 'zh' ? 'zh' : 'en';
  document.title = T('html_title');
  document.getElementById('headerTitle').innerHTML = T('header_title');
  document.getElementById('sideTitle').textContent = T('side_title');
  resetSideInfo();
  goStep(currentStep);
}

document.querySelectorAll('.lang-sw button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-sw button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    lang = btn.dataset.lang;
    applyLang();
  });
});

// ========== Init ==========
buildProgress();
resetSideInfo();
goStep(0);
</script>
